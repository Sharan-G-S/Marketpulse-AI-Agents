name: MarketPulse CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 to silence Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install isort flake8 flake8-bugbear

      - name: Check import ordering with isort
        run: isort --check-only --diff .

      - name: Lint with flake8 (syntax errors and undefined names)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style warnings, non-blocking)
        run: >
          flake8 . --count --exit-zero --max-line-length=120
          --max-complexity=12 --statistics
          --extend-ignore=E203,W503,W504

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            langgraph \
            langchain \
            langchain-core \
            langchain-openai \
            langchain-community \
            langchain-google-genai \
            yfinance \
            pandas \
            requests \
            python-dotenv \
            pydantic \
            pytest \
            pytest-asyncio

      - name: Run unit tests (fully mocked - no API keys needed)
        run: pytest tests/test_agents.py -v --tb=short

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: bandit -r . -x ./tests -ll
